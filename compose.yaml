services:
  django:
    build:
      context: .
      target: django
    container_name: task_manager-server
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn task_manager.wsgi:application --bind 0.0.0.0:8000 --timeout 120 --workers 2"
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - .:/app
    restart: always

  db:
    image: postgres:17
    container_name: task_manager-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  react:
    build:
      context: ./taskflow-manager # ← uses taskflow-manager/Dockerfile
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000/api
    container_name: task_manager-react
    ports:
      - "8080:80"
    depends_on:
      - django

volumes:
  postgres_data:
  static_volume:
  media_volume:
